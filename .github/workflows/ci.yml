name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  COVERAGE_FLOOR: '80'

jobs:
  lint-test-vuln:
    name: lint + test + vuln + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true

      - name: go mod verify
        run: |
          go mod download
          go mod verify

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.12.2

      - name: go test (with -race, no coverage flag — -race + -coverprofile collides on -covermode=atomic vs default; coverage gate runs separately below)
        run: go test ./... -race -count=1

      - name: per-package coverage ≥${{ env.COVERAGE_FLOOR }}%
        # Hard gate: EVERY Go package in the module must hit COVERAGE_FLOOR
        # or higher. No exceptions, no grandfathering, no "old code"
        # exemption. Packages with no _test.go files count as 0% and fail.
        # Coverage exclusion (sonar.coverage.exclusions etc.) is banned per
        # feedback_no_sonar_exclusions.md — fix coverage by writing tests.
        run: |
          set -uo pipefail
          floor="${COVERAGE_FLOOR}"

          # Use -count=1 to bypass test cache; -coverprofile to produce a
          # per-package report. Don't combine -race with -coverpkg here
          # (atomic-vs-set mode collision); the -race pass above already
          # covered race detection.
          rm -f coverage.out
          go test -coverprofile=coverage.out -covermode=count -count=1 ./... \
            | tee coverage-summary.txt

          # Parse summary lines into (pkg, pct) pairs. `ok` lines carry a
          # `coverage: NN.N% of statements` clause; `?` lines (no test
          # files) get treated as 0.0% — failing the gate.
          fail=0
          {
            echo "package | coverage | verdict"
            echo "--- | --- | ---"
          } > /tmp/cov-table.md
          while IFS= read -r line; do
            case "$line" in
              ok*coverage:*)
                pkg=$(awk '{print $2}' <<<"$line")
                pct=$(grep -oE 'coverage: [0-9.]+%' <<<"$line" | grep -oE '[0-9.]+')
                ;;
              ok*"[no statements]"*)
                # Packages with code but no measurable statements (rare;
                # e.g. interface-only). Treat as PASS.
                pkg=$(awk '{print $2}' <<<"$line")
                pct="100.0"
                ;;
              \?*"[no test files]"*)
                pkg=$(awk '{print $2}' <<<"$line")
                pct="0.0"
                ;;
              *)
                continue
                ;;
            esac
            verdict=$(awk -v p="$pct" -v f="$floor" 'BEGIN { print (p+0 >= f+0) ? "PASS" : "FAIL" }')
            echo "$pkg | $pct% | $verdict" >> /tmp/cov-table.md
            if [ "$verdict" = "FAIL" ]; then
              echo "::error file=$pkg::package coverage ${pct}% < ${floor}% floor"
              fail=1
            fi
          done < coverage-summary.txt

          echo
          echo "### Per-package coverage (floor = ${floor}%)"
          cat /tmp/cov-table.md

          # GitHub Actions step summary — pretty markdown table.
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "## Per-package coverage (floor = ${floor}%)"
              cat /tmp/cov-table.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$fail" = "1" ]; then
            echo "::error::one or more packages below ${floor}% coverage floor"
            exit 1
          fi

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
