name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  COVERAGE_FLOOR: '75'

jobs:
  lint-test-vuln:
    name: lint + test + vuln + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true

      - name: go mod verify
        run: |
          go mod download
          go mod verify

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: v2.12.2

      - name: go test (with -race, no coverage flag — -race + -coverprofile collides on -covermode=atomic vs default; coverage gate runs separately below)
        run: go test ./... -race -count=1

      - name: per-package coverage ratchet
        # Ratchet gate: each package must stay at or above its recorded
        # baseline in .github/coverage-baseline.tsv. A package with no
        # baseline entry (i.e. NEW) must meet COVERAGE_FLOOR. Nothing is
        # excluded from measurement — 0% packages are visible debt in the
        # baseline file, per feedback_no_sonar_exclusions.md (fix coverage
        # by writing tests, never by hiding code). Goal stays COVERAGE_FLOOR;
        # raise a baseline whenever you add tests.
        shell: bash
        run: |
          set -uo pipefail
          floor="${COVERAGE_FLOOR}"
          baseline_file=".github/coverage-baseline.tsv"

          # Baseline lookup uses awk (exact tab-field match) rather than a
          # bash-4 associative array, so the gate is portable and testable
          # on any POSIX-ish shell. Returns "" when a package is absent.
          baseline_for() {
            awk -F'\t' -v p="$1" '$1==p { print $2; exit }' "$baseline_file"
          }

          # Use -count=1 to bypass test cache; -coverprofile to produce a
          # per-package report. Don't combine -race with -coverpkg here
          # (atomic-vs-set mode collision); the -race pass above already
          # covered race detection.
          rm -f coverage.out
          go test -coverprofile=coverage.out -covermode=count -count=1 ./... \
            | tee coverage-summary.txt

          # `go test ./...` under -coverprofile emits two line shapes:
          #   "ok  \t<pkg>\t<elapsed>\tcoverage: NN.N% of statements"
          #   "    \t<pkg>\t        \tcoverage: 0.0% of statements"  (no _test.go)
          fail=0
          {
            echo "package | coverage | baseline | verdict"
            echo "--- | --- | --- | ---"
          } > /tmp/cov-table.md
          while IFS= read -r line; do
            case "$line" in
              *coverage:*) ;;
              *) continue ;;
            esac
            if [[ "$line" =~ ^ok[[:space:]] ]]; then
              pkg=$(awk '{print $2}' <<<"$line")
            else
              pkg=$(awk '{print $1}' <<<"$line")
            fi
            pct=$(grep -oE 'coverage: [0-9.]+%' <<<"$line" | grep -oE '[0-9.]+')
            if [ -z "$pct" ]; then
              # `[no statements]` style — interface-only or generated code.
              pct="100.0"
            fi

            req="$(baseline_for "$pkg")"
            if [ -n "$req" ]; then
              req_label="${req}% (baseline)"
            else
              req="$floor"; req_label="${floor}% (new pkg → floor)"
            fi

            verdict=$(awk -v p="$pct" -v r="$req" 'BEGIN { print (p+0 >= r+0) ? "PASS" : "FAIL" }')
            echo "$pkg | $pct% | $req_label | $verdict" >> /tmp/cov-table.md
            if [ "$verdict" = "FAIL" ]; then
              echo "::error file=$pkg::package coverage ${pct}% < required ${req}%"
              fail=1
            else
              # Nudge to lock in gains: coverage well above baseline.
              awk -v p="$pct" -v r="$req" 'BEGIN { exit !(p+0 >= r+10) }' \
                && echo "::notice file=$pkg::coverage ${pct}% is ≥10pp above baseline ${req}% — raise the baseline to lock it in"
            fi
          done < coverage-summary.txt

          echo
          echo "### Per-package coverage ratchet (goal = ${floor}%)"
          cat /tmp/cov-table.md

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "## Per-package coverage ratchet (goal = ${floor}%)"
              cat /tmp/cov-table.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$fail" = "1" ]; then
            echo "::error::one or more packages regressed below their coverage baseline"
            exit 1
          fi

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...
